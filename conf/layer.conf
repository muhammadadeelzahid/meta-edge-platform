# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-device-base"
BBFILE_PATTERN_meta-device-base = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-device-base = "6"

LAYERDEPENDS_meta-device-base = "core"
LAYERSERIES_COMPAT_meta-device-base = "scarthgap"
